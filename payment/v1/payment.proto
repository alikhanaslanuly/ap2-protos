syntax = "proto3";

package payment.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/alikhanaslanuly/ap2-gen/payment/v1;paymentv1";

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
}

message PaymentRequest {
  string order_id = 1;
  string user_id  = 2;
  double amount   = 3;
}

message PaymentResponse {
  string                    payment_id = 1;
  string                    status     = 2;
  string                    message    = 3;
  google.protobuf.Timestamp paid_at    = 4;
}